services:
  postgres:
    image: postgres:16-alpine
    container_name: tasktracker-postgres
    environment:
      POSTGRES_DB: tasktracker
      POSTGRES_USER: tasktracker
      POSTGRES_PASSWORD: tasktracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U tasktracker -d tasktracker" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
