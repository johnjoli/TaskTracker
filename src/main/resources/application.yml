spring:
  datasource:
    url: jdbc:h2:mem:tasktracker;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
  h2:
    console:
      enabled: true
  jackson:
    default-property-inclusion: non_null

server:
  error:
    include-message: always

app:
  jwt:
    secret: tasktracker-super-secret-key-tasktracker-2025
    expiration: 3600000
  bootstrap:
    admin:
      username: admin
      password: admin12345
